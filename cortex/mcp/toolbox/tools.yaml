kind: toolsets
name: cortex-readonly
tools:
  - query-facts
  - query-ghosts
  - query-decisions
  - query-signals
  - cortex-stats
  - trace-impact
  - cluster-signals
  - ghost-mapping

---

kind: toolsets
name: graph-analysis
tools:
  - trace-impact
  - cluster-signals
  - ghost-mapping

---

kind: toolsets
name: cortex-summary
tools:
  - cortex-stats
