  /v1/facts/{fact_id}/taint:
    post:
      description: Trigger Ω₁₃ taint propagation from a compromised/invalidated fact.
      operationId: propagate_taint_v1_facts__fact_id__taint_post
      parameters:
      - explode: false
        in: path
        name: fact_id
        required: true
        schema:
          title: Fact Id
          type: integer
        style: simple
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Propagate Taint V1 Facts  Fact Id  Taint Post
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Propagate Taint
      tags:
      - facts
  /v1/facts/verify:
