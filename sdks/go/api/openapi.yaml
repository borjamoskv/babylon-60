      operationId: verify_ledger_v1_facts_verify_get
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Verify Ledger V1 Facts Verify Get
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Verify Ledger
      tags:
      - facts
  /v1/facts/{fact_id}/vote:
    post:
      description: Cast a consensus vote (verify/dispute) on a fact.
      operationId: cast_vote_v1_facts__fact_id__vote_post
      parameters:
      - explode: false
        in: path
        name: fact_id
        required: true
        schema:
          title: Fact Id
          type: integer
        style: simple
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
