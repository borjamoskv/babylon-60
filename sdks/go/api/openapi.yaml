          title: Project
          type: string
        style: simple
      - explode: true
        in: query
        name: path
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          title: Format
          type: string
        style: form
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
