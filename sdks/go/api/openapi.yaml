          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Deprecate Fact V1 Facts  Fact Id  Delete
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Deprecate Fact
      tags:
      - facts
    get:
      description: Get a single fact by ID.
      operationId: get_fact_by_id_v1_facts__fact_id__get
      parameters:
      - explode: false
        in: path
        name: fact_id
        required: true
        schema:
          title: Fact Id
          type: integer
        style: simple
      - description: Bearer <api-key>
        explode: false
        in: header
