openapi: 3.1.0
info:
  description: "Local-first memory infrastructure for AI agents. Vector search, temporal\
    \ facts, cryptographic ledger."
  title: CORTEX - Sovereign Memory API
  version: 1.0.0
servers:
- url: /
paths:
  /:
    get:
      operationId: root_node__get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Root Node
      tags:
      - health
  /health:
    get:
      operationId: health_check_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Health Check Health Get
          description: Successful Response
      summary: Health Check
      tags:
      - health
  /metrics:
    get:
      operationId: get_metrics_metrics_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Metrics
      tags:
      - health
  /v1/events/stream:
    get:
      description: Subscribe to CORTEX coordination events via SSE.
      operationId: stream_events_v1_events_stream_get
      parameters:
      - description: Comma-separated list of event types
        explode: true
        in: query
        name: types
        required: false
        schema:
          description: Comma-separated list of event types
          nullable: true
          type: string
        style: form
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Stream Events
      tags:
      - events
  /v1/facts:
    get:
      operationId: list_all_facts_v1_facts_get
      parameters:
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FactResponse"
                title: Response List All Facts V1 Facts Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List All Facts
      tags:
      - facts
    post:
      description: Store a fact (scoped to authenticated tenant).
      operationId: store_fact_v1_facts_post
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Store Fact
      tags:
      - facts
  /v1/facts/batch:
    post:
      description: Batch store up to 100 facts in a single request.
      operationId: batch_store_v1_facts_batch_post
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchStoreRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Batch Store V1 Facts Batch Post
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Batch Store
      tags:
      - facts
  /v1/projects/{project}/facts:
    get:
      description: Recall facts for a specific project with tenant isolation.
      operationId: recall_facts_v1_projects__project__facts_get
      parameters:
      - explode: false
        in: path
        name: project
        required: true
        schema:
          title: Project
          type: string
        style: simple
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          maximum: 1000
          minimum: 1
          nullable: true
          type: integer
        style: form
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FactResponse"
                title: Response Recall Facts V1 Projects  Project  Facts Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Recall Facts
      tags:
      - facts
  /v1/facts/search:
    post:
