      operationId: search_facts_v1_facts_search_post
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchMemoryRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FactResponse"
                title: Response Search Facts V1 Facts Search Post
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Search Facts
      tags:
      - facts
  /v1/facts/{fact_id}/history:
