  /v1/facts/{fact_id}/chain:
    get:
      description: "Get the causal chain for a fact (up=ancestors, down=descendants)."
      operationId: get_causal_chain_v1_facts__fact_id__chain_get
      parameters:
      - explode: false
        in: path
        name: fact_id
        required: true
        schema:
          title: Fact Id
          type: integer
        style: simple
      - description: '''up'' or ''down'''
        explode: true
        in: query
        name: direction
        required: false
        schema:
          default: down
          description: '''up'' or ''down'''
          title: Direction
          type: string
        style: form
      - explode: true
        in: query
        name: max_depth
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 1
          title: Max Depth
          type: integer
        style: form
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  additionalProperties: true
                  type: object
                title: Response Get Causal Chain V1 Facts  Fact Id  Chain Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Causal Chain
      tags:
      - facts
  /v1/search:
    get:
      description: Semantic + Graph-RAG search via GET (scoped to tenant).
      operationId: search_facts_get_v1_search_get
      parameters:
      - explode: true
        in: query
        name: query
        required: true
        schema:
          maxLength: 1024
          title: Query
          type: string
        style: form
      - explode: true
        in: query
        name: k
        required: false
        schema:
          default: 5
          maximum: 50
          minimum: 1
          title: K
          type: integer
        style: form
      - explode: true
        in: query
        name: as_of
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: graph_depth
        required: false
        schema:
          default: 0
          maximum: 5
          minimum: 0
          title: Graph Depth
          type: integer
        style: form
      - explode: true
        in: query
        name: include_graph
        required: false
        schema:
          default: false
          title: Include Graph
          type: boolean
        style: form
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SearchResult"
                title: Response Search Facts Get V1 Search Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Search Facts Get
      tags:
      - search
    post:
      description: Semantic + Graph-RAG search across facts (scoped to tenant).
      operationId: search_facts_v1_search_post
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SearchResult"
                title: Response Search Facts V1 Search Post
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Search Facts
      tags:
      - search
  /v1/ask:
    post:
      description: |-
        RAG endpoint: search → synthesize → answer.

        Searches CORTEX memory for relevant facts, then uses the configured
        LLM to synthesize an answer grounded in those facts.

        Returns 503 if no LLM provider is configured.
      operationId: ask_cortex_v1_ask_post
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Ask Cortex
      tags:
      - ask
  /v1/ask/stream:
    post:
      description: |-
        Streaming RAG endpoint: search → synthesize → stream answer.

        Yields SSE 'data: ' events containing text chunks.
      operationId: ask_stream_v1_ask_stream_post
      parameters:
      - description: Bearer <api-key>
        explode: false
        in: header
        name: authorization
        required: false
        schema:
          description: Bearer <api-key>
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Ask Stream
      tags:
      - ask
  /v1/llm/status:
