[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 10000

# Base Network fork endpoint configuration (assuming API usage or local OP-node route)
rpc_endpoints = { base = "${BASE_WS_URL}" }
ffi = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
