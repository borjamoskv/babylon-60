name: Render VHS Tapes

on:
  push:
    paths:
      - 'assets/marketing/*.tape'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      
      - name: Install vhs
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update && sudo apt-get install vhs ffmpeg
          
      - name: Install dependencies for cortex
        run: |
          pip install -e .
          
      - name: Render Tapes
        run: |
          vhs assets/marketing/cortex_demo.tape
          vhs assets/marketing/cortex_demo_light.tape
          
      - name: Commit Assets
        run: |
          git config --global user.name "CORTEX-Daemon[bot]"
          git config --global user.email "cortex-daemon@users.noreply.github.com"
          git add assets/marketing/*.gif assets/marketing/*.mp4
          git commit -m "chore(vhs): auto-render C5-REAL terminal animations [skip ci]" || exit 0
          git push
