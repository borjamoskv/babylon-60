name: CORTEX Entropy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  evaluate-entropy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to evaluate diffs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CORTEX
        run: |
          pip install -e ".[all]"

      - name: Run Tests (Operational Entropy Data)
        run: |
          pytest tests/ --junitxml=pytest-report.xml
        continue-on-error: true # We want the report even if tests fail

      - name: Evaluate Entropy Delta
        id: cortex_eval
        run: |
          # The gateway command evaluates the diff of the PR and generates an entropy assessment.
          # If the decision is BLOCK or COLLAPSE, it returns a non-zero exit code.
          cortex gate evaluate --diff origin/${{ github.base_ref }}
