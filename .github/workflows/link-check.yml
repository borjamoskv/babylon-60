name: Link Check

on:
  push:
    paths:
      - "README.md"
      - "docs/index.md"
      - "docs/quickstart.md"
      - "docs/installation.md"
      - "docs/sdks.md"
      - "docs/NAMING.md"
      - "docs/PRODUCT-CORE.md"
  pull_request:
    paths:
      - "README.md"
      - "docs/index.md"
      - "docs/quickstart.md"
      - "docs/installation.md"
      - "docs/sdks.md"
      - "docs/NAMING.md"
      - "docs/PRODUCT-CORE.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  link-check:
    name: Check Markdown links
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Run markdown-link-check on key docs
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/mlc_config.json"
          file-path: >
            README.md,
            docs/index.md,
            docs/quickstart.md,
            docs/installation.md,
            docs/sdks.md,
            docs/NAMING.md,
            docs/PRODUCT-CORE.md
