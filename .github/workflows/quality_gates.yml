# CORTEX Quality Gates — 10-seal CI enforcement
# Axioms without enforcement are suggestions. We don't do suggestions.

name: "🔒 Quality Gates"

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: "10 Seals"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install CORTEX + dev deps
        run: |
          pip install -e ".[dev]" --quiet

      # ─── Gate 1: Lint (AX-011 Entropy Death) ──────────────────
      - name: "🔍 Gate 1: Lint — AX-011"
        run: ruff check cortex/ --output-format=github

      # ─── Gate 2: Type Check (AX-012 Type Safety) ──────────────
      # FIXED: was continue-on-error. Now blocks merges.
      - name: "🔍 Gate 2: Type Check — AX-012"
        run: |
          pip install mypy --quiet
          mypy cortex/ --ignore-missing-imports --no-error-summary

      # ─── Gate 3: Security Scan (AX-010 Zero Trust) ────────────
      - name: "🔍 Gate 3: Security Scan — AX-010"
        run: |
          pip install bandit --quiet
          bandit -r cortex/ -c pyproject.toml --severity-level high

      # ─── Gate 4: Test Coverage (AX-017 Ledger Integrity) ──────
      - name: "🔍 Gate 4: Tests + Coverage"
        run: |
          python -m pytest tests/ \
            --cov=cortex \
            --cov-fail-under=70 \
            --tb=short \
            -x -q \
            --timeout=60

      # ─── Gate 5: Ledger Integrity (AX-017) ────────────────────
      - name: "🔍 Gate 5: Ledger Integrity — AX-017"
        run: |
          python -c "
          from cortex.engine import CortexEngine
          import asyncio
          async def check():
              engine = CortexEngine(':memory:', auto_embed=False)
              await engine.init_db()
              print('✅ Ledger schema initialized successfully')
              await engine.close()
          asyncio.run(check())
          "

      # ─── Gate 6: Connection Guard (AX-017) ────────────────────
      - name: "🔍 Gate 6: Connection Guard — AX-017"
        run: python -m cortex.database.connection_guard --root cortex

      # ─── Gate 7: Async Guard (AX-013 Async Native) ────────────
      # NEW: Blocks time.sleep() in async production code.
      - name: "🔍 Gate 7: Async Guard — AX-013"
        run: |
          VIOLATIONS=$(grep -rn "time\.sleep" cortex/ --include="*.py" \
            | grep -v "test" \
            | grep -v "__pycache__" \
            | grep -v ".pyc" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ AX-013 VIOLATION: time.sleep() found in production code:"
            echo "$VIOLATIONS"
            echo ""
            echo "Use asyncio.to_thread() or asyncio.sleep() instead."
            exit 1
          else
            echo "✅ No time.sleep() in production code"
          fi

      # ─── Gate 8: LOC Guard (AX-011 Entropy Death) ─────────────
      # NEW: Files >500 LOC block merge. >300 LOC emit warning.
      - name: "🔍 Gate 8: LOC Guard — AX-011"
        run: |
          BLOCKED=0
          echo "📏 Checking file sizes..."
          while IFS= read -r file; do
            LOC=$(wc -l < "$file")
            if [ "$LOC" -gt 500 ]; then
              echo "❌ BLOCKED: $file ($LOC lines > 500 max)"
              BLOCKED=1
            elif [ "$LOC" -gt 300 ]; then
              echo "⚠️  WARNING: $file ($LOC lines > 300 target)"
            fi
          done < <(find cortex/ -name "*.py" -not -path "*/test*" -not -path "*__pycache__*")
          if [ "$BLOCKED" -eq 1 ]; then
            echo ""
            echo "AX-011: Entropy Death — files >500 LOC must be split."
            exit 1
          fi
          echo "✅ All files within entropy limits"

      # ─── Gate 9: Axiom Registry Integrity ──────────────────────
      # NEW: Verifies the canonical registry loads without errors.
      - name: "🔍 Gate 9: Axiom Registry"
        run: |
          python -c "
          from cortex.axioms import AXIOM_REGISTRY, AxiomCategory
          from cortex.axioms.registry import by_category, enforced

          total = len(AXIOM_REGISTRY)
          const = len(by_category(AxiomCategory.CONSTITUTIONAL))
          oper = len(by_category(AxiomCategory.OPERATIONAL))
          aspir = len(by_category(AxiomCategory.ASPIRATIONAL))
          enf = len(enforced())

          print(f'✅ Axiom Registry: {total} axioms loaded')
          print(f'   🔴 Constitutional: {const}')
          print(f'   🔵 Operational: {oper}')
          print(f'   🟡 Aspirational: {aspir}')
          print(f'   🛡️  CI-enforced: {enf}')

          assert total >= 20, f'Registry degraded: {total} axioms (min 20)'
          assert const >= 3, f'Constitutional layer missing: {const}'
          "

      # ─── Gate 10: Prompt Size Check ────────────────────────────
      - name: "🔍 Gate 10: Prompt Size"
        run: |
          if [ -f "SYSTEM_PROMPT.md" ]; then
            TOKENS=$(wc -w < SYSTEM_PROMPT.md)
            echo "System prompt: $TOKENS words"
            if [ "$TOKENS" -gt 500 ]; then
              echo "⚠️  WARNING: System prompt is $TOKENS words (target: <200 tokens)"
            else
              echo "✅ System prompt is within target"
            fi
          else
            echo "ℹ️  No SYSTEM_PROMPT.md found"
          fi
        continue-on-error: true
