# CORTEX Quality Gates — 10-seal CI enforcement
# Axioms without enforcement are suggestions. We don't do suggestions.

name: "🔒 Quality Gates"

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: "10 Seals"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install CORTEX + dev deps
        run: |
          pip install -e ".[dev]" ruff mypy bandit pytest pytest-asyncio pytest-cov --quiet

      # ─── SOVEREIGN SEALS (Local & CI Unified) ────────────────────
      - name: "🛡️ Execute 10 Seals"
        run: python -m cortex.guards.seals
