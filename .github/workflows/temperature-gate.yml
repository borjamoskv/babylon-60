name: Temperature Determinism Gate

# Ω₃ (Byzantine Default): No new LLM provider enters production
# without passing the determinism gate at temp ≤ 0.1.
#
# Runs on:
# - Every PR touching llm/ or benchmarks/
# - Manual dispatch (to gate a specific model)
# - Weekly cron (regression watchdog)

on:
  pull_request:
    branches: [master, main]
    paths:
      - "cortex/llm/**"
      - "benchmarks/bench_temperature.py"
      - "tests/test_temperature_determinism.py"
      - ".github/workflows/temperature-gate.yml"

  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model to gate (e.g. qwen2.5-coder:7b)"
        required: false
        default: "qwen2.5-coder:7b"
      runs:
        description: "Number of runs per temperature point"
        required: false
        default: "10"

  schedule:
    # Every Monday 07:00 UTC — catches silent model regressions
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  # ─── Gate: logic tests (no Ollama) ────────────────────────────────────────
  gate-logic:
    name: Gate Logic (mocked, always runs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]" httpx pytest pytest-asyncio

      - name: Run determinism gate tests (mocked)
        run: |
          pytest tests/test_temperature_determinism.py \
            -v --tb=short \
            -k "not TestCLI"
        env:
          CORTEX_TEST_MODE: "true"

  # ─── Gate: live Ollama (self-hosted runner only) ───────────────────────────
  gate-live:
    name: Live Model Gate (self-hosted)
    runs-on: [self-hosted, ollama]  # Requires a runner with Ollama installed
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: gate-logic

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install httpx

      - name: Pull model
        run: |
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}"
          ollama pull "$MODEL"

      - name: Run live determinism benchmark
        run: |
          python benchmarks/bench_temperature.py \
            --model "${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}" \
            --runs "${{ github.event.inputs.runs || '10' }}" \
            --json gate-report.json \
            --quiet
        # Exit 1 if gate fails — blocks merge

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: temperature-gate-report
          path: gate-report.json

      - name: Comment PR with gate results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('gate-report.json', 'utf8');
            const r = JSON.parse(raw);
            const icon = r.passed ? '✅' : '❌';
            const body = [
              `## ${icon} Temperature Determinism Gate — \`${r.model}\``,
              '',
              `| Metric | Value | Gate |`,
              `|--------|-------|------|`,
              `| Drift (low temp unique ratio) | ${(r.drift_ratio * 100).toFixed(0)}% | ≤ 40% |`,
              `| Entropy gap (high - low) | ${(r.entropy_gap * 100).toFixed(0)}% | ≥ 25% |`,
              '',
              r.passed
                ? '_Model approved for production stack._'
                : `**FAILURES:**\n${r.violations.map(v => `- ${v}`).join('\n')}`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ─── Guard: skip gracefully on standard CI (no Ollama) ───────────────────
  gate-skip-check:
    name: Skip Guard (standard runners)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: gate-logic

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install httpx

      - name: Verify --allow-skip works (Ollama absent)
        run: |
          python benchmarks/bench_temperature.py \
            --quick \
            --allow-skip \
            --model nonexistent:99b
        # Must exit 0 — Ollama absent on standard runners is not an error
