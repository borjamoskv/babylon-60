name: Temperature Determinism Gate

# Ω₃ (Byzantine Default): No new LLM provider enters production
# without passing the determinism gate at temp ≤ 0.1.
#
# Runs on:
# - Every PR touching llm/ or benchmarks/
# - Manual dispatch (to gate a specific model)
# - Weekly cron (regression watchdog)

on:
  pull_request:
    branches: [main]
    paths:
      - "cortex/llm/**"
      - "benchmarks/bench_temperature.py"
      - "tests/test_temperature_determinism.py"
      - ".github/workflows/temperature-gate.yml"
  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model to gate (e.g. qwen2.5-coder:7b)"
        required: false
        default: "qwen2.5-coder:7b"
      runs:
        description: "Number of runs per temperature point"
        required: false
        default: "10"
  schedule:
    # Every Monday 07:00 UTC - catches silent model regressions
    - cron: "0 7 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Gate: logic tests (no Ollama)
  gate-logic:
    name: Gate Logic (mocked, always runs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]" httpx pytest pytest-asyncio
      - name: Run determinism gate tests (mocked)
        run: |
          if [ ! -f tests/test_temperature_determinism.py ]; then
            echo "tests/test_temperature_determinism.py not present; skipping mocked determinism gate."
            exit 0
          fi
          pytest tests/test_temperature_determinism.py \
            -v --tb=short \
            -k "not TestCLI"
        env:
          CORTEX_TEST_MODE: "true"

  # Gate: live Ollama (self-hosted runner only)
  gate-live:
    name: Live Model Gate (self-hosted)
    runs-on: [self-hosted, ollama]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: gate-logic
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install httpx
      - name: Pull model
        run: |
          MODEL="${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}"
          ollama pull "$MODEL"
      - name: Run live determinism benchmark
        run: |
          python benchmarks/bench_temperature.py \
            --model "${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}" \
            --runs "${{ github.event.inputs.runs || '10' }}" \
            --json gate-report.json \
            --quiet
      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: temperature-gate-report
          path: gate-report.json

  # Guard: skip gracefully on standard CI (no Ollama)
  gate-skip-check:
    name: Skip Guard (standard runners)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: gate-logic
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install httpx
      - name: Verify --allow-skip works (Ollama absent)
        run: |
          python benchmarks/bench_temperature.py \
            --quick \
            --allow-skip \
            --model nonexistent:99b
          # Must exit 0 - Ollama absent on standard runners is not an error
