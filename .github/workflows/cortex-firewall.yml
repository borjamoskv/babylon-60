name: 🧯 CORTEX CI/CD Firewall

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  audit-ai-code:
    name: Audit PR Entropy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git numstat calculations

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install CORTEX-PERSIST
        run: |
          pip install poetry
          poetry install --no-interaction --no-ansi

      - name: 🔍 Run CORTEX Code Governance Gateway
        id: cortex_audit
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TARGET_BRANCH: origin/${{ github.event.pull_request.base.ref }}
        run: |
          # Fetch the target branch so git numstat has a reference
          git fetch origin ${{ github.event.pull_request.base.ref }}
          
          # Run the Audit Gateway and capture output
          echo "Running CORTEX Firewall on PR #${PR_NUMBER} against ${TARGET_BRANCH}"
          
          # The gateway will exit 1 if entropy policy is violated
          set +e
          OUTPUT=$(poetry run cortex gateway audit --pr-id "$PR_NUMBER" --target-branch "$TARGET_BRANCH")
          EXIT_CODE=$?
          set -e
          
          # Write Markdown output to step summary
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
          
          # Export to a file for the PR comment step
          echo "$OUTPUT" > cortex_report.md
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::CORTEX Firewall rejected this PR. Entropy threshold exceeded."
            echo "exit_status=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "exit_status=passed" >> $GITHUB_OUTPUT
          fi

      - name: 💬 Comment PR with CORTEX Report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} -F cortex_report.md
