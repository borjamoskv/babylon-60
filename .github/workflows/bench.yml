name: Criterion Benchmark · C5-ABSOLUTE

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bench:
    name: cargo bench (Rust FFI core)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cortex_rs/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('cortex_rs/Cargo.lock') }}

      - name: Run Criterion benchmarks
        working-directory: cortex_rs
        run: cargo bench --bench '*' -- --output-format bencher | tee ../benchmark_results.txt

      - name: Upload raw benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: criterion-bench-${{ github.sha }}
          path: benchmark_results.txt
          retention-days: 90

      - name: Attach results to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: benchmark_results.txt
          body: |
            ## Benchmark Results · C5-ABSOLUTE Proof
            Criterion.rs output attached. Throughput target: ≥390k events/sec (GIL-free Rust-FFI core).
