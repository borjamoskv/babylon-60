name: Meta CI Router

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: meta-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify PR surface
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
      sdk: ${{ steps.filter.outputs.sdk }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@de90cc6fb38da3470077846e5d4b05f0492464ff # v3
        with:
          filters: |
            code:
              - 'cortex/**'
              - 'api/**'
              - 'benchmarks/**'
              - 'scripts/**'
            workflows:
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'README.es.md'
              - 'README.zh.md'
            infra:
              - 'infra/**'
              - 'Dockerfile'
              - 'vercel.json'
            sdk:
              - 'sdks/**'
              - 'cortex-sdk/**'
            tests:
              - 'tests/**'

  summarize:
    name: Summarize merge risk
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - name: Emit PR routing summary
        run: |
          echo '### Meta CI Router' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Surface | Changed |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          echo '| code | ${{ needs.classify.outputs.code }} |' >> "$GITHUB_STEP_SUMMARY"
          echo '| workflows | ${{ needs.classify.outputs.workflows }} |' >> "$GITHUB_STEP_SUMMARY"
          echo '| docs | ${{ needs.classify.outputs.docs }} |' >> "$GITHUB_STEP_SUMMARY"
          echo '| infra | ${{ needs.classify.outputs.infra }} |' >> "$GITHUB_STEP_SUMMARY"
          echo '| sdk | ${{ needs.classify.outputs.sdk }} |' >> "$GITHUB_STEP_SUMMARY"
          echo '| tests | ${{ needs.classify.outputs.tests }} |' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'This workflow is additive: it does not block merges. It gives a low-noise surface map so oversized PRs can be split before CI turns into decorative thermodynamics.' >> "$GITHUB_STEP_SUMMARY"
