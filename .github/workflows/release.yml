name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cortex-persist/
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: pip install build twine
      - run: python -m build
      - run: python scripts/release_preflight.py
      - run: python -m twine check dist/*

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # trusted publisher — keep tag

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0  # signing — keep tag for compat
        with:
          inputs: dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: signed-dist
          path: |
            dist/*
            dist/*.sigstore.json

      - name: Verify PyPI release is visible
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = None
          for path in Path("dist").glob("*.whl"):
              stem = path.name.split("-")
              if len(stem) >= 2:
                  version = stem[1]
                  break
          if version is None:
              raise SystemExit("unable to determine built version from wheel filename")

          url = "https://pypi.org/pypi/cortex-persist/json"
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
                  payload = {"releases": {}}
              if version in payload.get("releases", {}):
                  print(f"PyPI now exposes cortex-persist {version}")
                  break
              if attempt == 11:
                  raise SystemExit(f"cortex-persist {version} not visible on PyPI after publish")
              time.sleep(10)
          PY
