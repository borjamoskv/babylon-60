name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cortex-persist
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install build twine
      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]

          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]
          if actual_tag != expected_tag:
              print(
                  f"Release tag {actual_tag!r} does not match pyproject version "
                  f"{version!r}; expected {expected_tag!r}.",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY
      - name: Check PyPI version is not already published
        run: |
          python - <<'PY'
          import json
          import sys
          import tomllib
          import urllib.error
          import urllib.request

          with open("pyproject.toml", "rb") as fh:
              project = tomllib.load(fh)["project"]

          package_name = project["name"]
          version = project["version"]
          url = f"https://pypi.org/pypi/{package_name}/json"

          try:
              with urllib.request.urlopen(url, timeout=15) as response:
                  releases = json.load(response).get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  releases = {}
              else:
                  raise

          if version in releases:
              print(
                  f"{package_name} {version} is already published on PyPI; "
                  "bump pyproject.toml before tagging.",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY
      - run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # trusted publisher — keep tag

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0  # signing — keep tag for compat
        with:
          inputs: dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: signed-dist
          path: |
            dist/*
            dist/*.sigstore.json
