name: Publish to PyPI

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# This workflow publishes the cortex-persist package to PyPI on every
# GitHub Release. Before cutting the first release:
#   1. Configure a Trusted Publisher on PyPI for:
#      - PyPI project name: cortex-persist
#      - GitHub owner:      borjamoskv
#      - GitHub repository: Cortex-Persist
#      - Workflow filename: publish.yml
#      - Environment:       pypi
#   See: https://docs.pypi.org/trusted-publishers/

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install build twine

      - name: Build source distribution and wheel
        run: python -m build

      - name: Validate artifacts
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses OIDC trusted publishing — no API token needed.
          # Repository URL defaults to https://upload.pypi.org/legacy/
          print-hash: true
