name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  build-wheels-linux:
    name: Build Linux Wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Tag Matches pyproject.toml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [[ "$GITHUB_REF_NAME" != "v$PROJECT_VERSION" ]]; then
            echo "Error: Tag $GITHUB_REF_NAME does not match project version v$PROJECT_VERSION"
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          sdist: true
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/

  build-wheels-macos:
    name: Build macOS Wheels
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels-linux, build-wheels-macos]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cortex-persist
    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-dist
          path: |
            dist/*
            dist/*.sigstore.json

      - name: Verify PyPI release is visible
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = None
          for path in Path("dist").glob("*.whl"):
              stem = path.name.split("-")
              if len(stem) >= 2:
                  version = stem[1]
                  break
          if version is None:
              raise SystemExit("unable to determine built version from wheel filename")

          url = "https://pypi.org/pypi/cortex-persist/json"
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
                  payload = {"releases": {}}
              if version in payload.get("releases", {}):
                  print(f"PyPI now exposes cortex-persist {version}")
                  break
              if attempt == 11:
                  raise SystemExit(f"cortex-persist {version} not visible on PyPI after publish")
              time.sleep(10)
          PY
