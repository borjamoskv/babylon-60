# ─────────────────────────────────────────────────────────────
# Production CI/CD · Multi-cloud deploy + security scans
# ─────────────────────────────────────────────────────────────
name: Production Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Phase 1: Quality Gate ─────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,api]"
          pip install ruff bandit safety mypy

      - name: Lint (Ruff)
        run: ruff check cortex/ --output-format=github

      - name: Type check (mypy — supplementary, Pyright is canonical)
        run: mypy cortex/ --ignore-missing-imports || true

      - name: Security scan (Bandit)
        run: bandit -r cortex/ -f json -o bandit-report.json || true

      - name: Dependency audit (Safety)
        run: safety check --json --output safety-report.json || true

      - name: Unit tests
        run: pytest tests/ -q --tb=short --junitxml=test-results.xml

      - name: Quality score check
        run: |
          python -c "
          from cortex.extensions.quality.scan import scan
          result = scan('cortex', 'cortex/')
          score = result.score
          print(f'Quality score: {score}/100')
          if score < 70:
              raise SystemExit(f'BLOCKED: Score {score} < 70 threshold')
          "

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: quality-reports
          path: |
            bandit-report.json
            safety-report.json
            test-results.xml

  # ── Phase 2: Container Build ──────────────────────────────
  build:
    name: "🏗️ Build & Scan Container"
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4

      - name: Build Docker image
        run: docker build -t cortex-persist:${{ github.sha }} .

      - name: Trivy scan (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9a1457 # v0.28.0
        with:
          image-ref: cortex-persist:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-report.sarif

      - name: Push to registries
        if: github.ref == 'refs/heads/main'
        run: |
          # GCR
          echo '${{ secrets.GCP_SA_KEY }}' | docker login -u _json_key --password-stdin gcr.io
          docker tag cortex-persist:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT }}/cortex-persist:${{ github.sha }}
          docker tag cortex-persist:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT }}/cortex-persist:latest
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/cortex-persist:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/cortex-persist:latest
          # ECR
          aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY }}
          docker tag cortex-persist:${{ github.sha }} ${{ secrets.AWS_ECR_REGISTRY }}/cortex-persist:${{ github.sha }}
          docker push ${{ secrets.AWS_ECR_REGISTRY }}/cortex-persist:${{ github.sha }}
          # ACR
          docker login ${{ secrets.AZURE_ACR_REGISTRY }} -u ${{ secrets.AZURE_ACR_USER }} -p ${{ secrets.AZURE_ACR_PASSWORD }}
          docker tag cortex-persist:${{ github.sha }} ${{ secrets.AZURE_ACR_REGISTRY }}/cortex-persist:${{ github.sha }}
          docker push ${{ secrets.AZURE_ACR_REGISTRY }}/cortex-persist:${{ github.sha }}

  # ── Phase 3: Infrastructure ───────────────────────────────
  terraform:
    name: "☁️ Multi-Cloud Infra"
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: hashicorp/setup-terraform@v3  # verified publisher — keep tag
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -no-color
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Phase 4: Deploy to K8s clusters ───────────────────────
  deploy:
    name: "🚀 Deploy to GCP"
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4

      - name: Deploy to GCP
        run: |
          kubectl apply -f infra/k8s/gcp/ --recursive
          kubectl set image deployment/cortex-persist cortex=gcr.io/${{ secrets.GCP_PROJECT }}/cortex-persist:${{ github.sha }} -n cortex
          kubectl rollout status deployment/cortex-persist -n cortex --timeout=300s

  # ── Phase 5: Smoke Tests ──────────────────────────────────
  smoke:
    name: "🔥 Smoke Tests"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - name: Health checks
        run: |
          checked=0
          for endpoint in "${AWS_ENDPOINT:-}" "${GCP_ENDPOINT:-}" "${AZURE_ENDPOINT:-}"; do
            if [ -z "$endpoint" ]; then
              continue
            fi
            checked=1
            curl -sf "$endpoint/health" || exit 1
            echo "✅ $endpoint healthy"
          done
          if [ "$checked" -eq 0 ]; then
            echo "No external endpoints configured; skipping smoke health checks."
          fi
