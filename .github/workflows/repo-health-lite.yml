name: Repo Health Lite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  change-scope:
    runs-on: ubuntu-latest
    outputs:
      sigint_related: ${{ steps.scope.outputs.sigint_related }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
      - id: scope
        shell: bash
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          event_name="${{ github.event_name }}"
          diff_range=""

          if [[ "$event_name" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            diff_range="origin/${{ github.base_ref }}...HEAD"
          elif [[ "$event_name" == "push" && "${{ github.event.before }}" != "$zero_sha" ]]; then
            diff_range="${{ github.event.before }}...HEAD"
          fi

          if [[ -z "$diff_range" ]]; then
            echo "sigint_related=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$diff_range")
          sigint_related=false

          for file in "${files[@]}"; do
            case "$file" in
              .github/workflows/sigint-monitor.yml|cortex/extensions/moltbook/sigint.py)
                sigint_related=true
                ;;
            esac
          done

          echo "sigint_related=$sigint_related" >> "$GITHUB_OUTPUT"

  changed-files-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Check changed files for conflict markers and syntax errors
        run: python scripts/repo_health_changed.py

  sigint-entrypoint-smoke:
    needs: [change-scope]
    if: needs.change-scope.outputs.sigint_related == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install SIGINT smoke dependency
        run: python -m pip install httpx --quiet
      - name: Verify SIGINT module entrypoint
        run: |
          python -m cortex.extensions.moltbook.sigint --help
          python -m cortex.extensions.moltbook.sigint \
            --mode blueprint \
            --text "en resumen, como modelo de lenguaje"
