name: Exergy Singularity (Anergy Purge)

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 03:00 UTC
  workflow_dispatch:     # Allows manual trigger

jobs:
  exergy-purge:
    name: Absolute Entropy Annihilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Ledger
        uses: actions/checkout@v4

      - name: Setup Sovereign Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Purge Python Caches (x10 Deep Sweep)
        run: |
          set -euo pipefail
          echo "[C5-REAL] Initiating CI/CD Exergy Purge..."
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".pytest_cache" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".ruff_cache" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".mypy_cache" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true

      - name: Purge NPM Caches
        run: |
          set -euo pipefail
          npm cache clean --force || true
          rm -rf node_modules/.cache 2>/dev/null || true

      - name: Vacum SQLite Structural Capital
        run: |
          set -euo pipefail
          for db in $(find . -name "*.db"); do
            if [ -f "$db" ]; then
              sqlite3 "$db" "VACUUM;" || true
            fi
          done

      - name: Confirm Exergy Maximization
        run: |
          echo "Singularity Achieved in CI/CD pipeline. System exergy maximized at 100%. Entropy is zero."
