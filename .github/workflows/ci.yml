name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|README.md|RELEASE_PROCESS.md|CHANGELOG.md|Dockerfile|pyproject.toml|MANIFEST.in|scripts/release_preflight.py|scripts/repo_health_changed.py)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          python_files="$(grep -E '^(cortex|tests|scripts)/.*\.py$' .changed_files || true)"
          {
            echo "release_only=${release_only}"
            echo "python_files<<EOF"
            printf '%s\n' "${python_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install ruff
          if [ "${{ steps.scope.outputs.release_only }}" != "true" ]; then
            pip install -e ".[dev,api]"
          fi
      - name: Ruff lint (release-only)
        if: steps.scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files changed in release-only scope."
            exit 0
          fi
          ruff check "${files[@]}"
      - name: Ruff lint
        if: steps.scope.outputs.release_only != 'true'
        run: ruff check cortex/ tests/
      - name: Ruff format check (release-only)
        if: steps.scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files changed in release-only scope."
            exit 0
          fi
          ruff format --check "${files[@]}"
      - name: Ruff format check
        if: steps.scope.outputs.release_only != 'true'
        run: ruff format --check cortex/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|README.md|RELEASE_PROCESS.md|CHANGELOG.md|Dockerfile|pyproject.toml|MANIFEST.in|scripts/release_preflight.py|scripts/repo_health_changed.py)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          python_files="$(grep -E '^(cortex|tests|scripts)/.*\.py$' .changed_files || true)"
          {
            echo "release_only=${release_only}"
            echo "python_files<<EOF"
            printf '%s\n' "${python_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        if: steps.scope.outputs.release_only != 'true'
        run: pip install -e ".[dev,api]"
      - name: Install security tools
        run: |
          if [ "${{ steps.scope.outputs.release_only }}" = "true" ]; then
            pip install ruff
          else
            pip install pip-audit bandit ruff
          fi
      - name: Audit dependencies for known CVEs
        if: steps.scope.outputs.release_only != 'true'
        run: pip-audit . --desc on --ignore-vuln GHSA-qmgc-5h2g-mvrw --ignore-vuln GHSA-j842-xgm4-wf88 --ignore-vuln GHSA-w6vg-jg77-2qg6 --ignore-vuln GHSA-f83h-ghpp-7wcc --ignore-vuln GHSA-jr27-m4p2-rc6r
      - name: Release-only security smoke
        if: steps.scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -gt 0 ]; then
            ruff check "${files[@]}" --select S --output-format json -o bandit-report.json
          else
            printf '[]\n' > bandit-report.json
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          payload = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "version": 1,
              "components": [],
          }
          Path("sbom.json").write_text(json.dumps(payload) + "\n", encoding="utf-8")
          PY
      - name: Ruff SAST scan (S-select)
        if: steps.scope.outputs.release_only != 'true'
        run: ruff check cortex/ --select S --output-format json -o bandit-report.json
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: bandit-report
          path: bandit-report.json
      - name: SBOM generation
        if: steps.scope.outputs.release_only != 'true'
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0
        with:
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: sbom
          path: sbom.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      CORTEX_TEST_MODE: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|README.md|RELEASE_PROCESS.md|CHANGELOG.md|Dockerfile|pyproject.toml|MANIFEST.in|scripts/release_preflight.py|scripts/repo_health_changed.py)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          {
            echo "release_only=${release_only}"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        if: steps.scope.outputs.release_only != 'true'
        run: |
          pip install -e ".[dev,api]"
      - name: Install release smoke dependencies
        if: steps.scope.outputs.release_only == 'true'
        run: pip install build twine
      - name: Release-only smoke
        if: steps.scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/repo_health_changed.py
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            python -m build
            python scripts/release_preflight.py
            python -m twine check dist/*
          fi
      - name: Show test environment
        if: steps.scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python --version
          python -m pytest --version
          pip freeze | sort | grep -E '^(coverage|pytest|pytest-asyncio|pytest-cov|pytest-timeout)=' || true
          python -m pytest --trace-config -q > test-artifacts/pytest-trace-config.txt 2>&1 || true
      - name: Collect tests
        if: steps.scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python -m pytest tests/ --collect-only -q 2>&1 | tee test-artifacts/collect.log
      - name: Run tests with coverage
        if: steps.scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          status=0
          timeout --signal=TERM 20m \
          python -X faulthandler -m pytest tests/ -vv -s --tb=short -x \
            --durations=20 \
            --timeout=300 \
            --timeout-method=thread \
            --junitxml=test-artifacts/pytest.xml \
            -o faulthandler_timeout=300 \
            --cov=cortex \
            --cov-report=xml \
            --cov-report=term-missing \
            2>&1 | tee test-artifacts/pytest.log || status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            echo "pytest exit code: ${status}"
            ps -ef || true
            pstree -ap || true
            exit "${status}"
          fi
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: test-diagnostics-py${{ matrix.python-version }}
          if-no-files-found: warn
          path: |
            test-artifacts/
            coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          pip install build twine
          python -m build
          python scripts/release_preflight.py
          python -m twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - name: Build Docker image
        run: docker build -t cortex:test .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: cortex:test
          exit-code: 1
          severity: CRITICAL,HIGH
          format: table
      - name: Smoke test
        run: |
          docker run --rm -d --name cortex-test -p 8484:8484 cortex:test
          sleep 5
          curl -f http://localhost:8484/health || exit 1
          docker stop cortex-test
