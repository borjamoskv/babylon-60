name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -e ".[dev,api]"
          pip install ruff
      - name: Ruff lint
        run: ruff check cortex/ tests/
      - name: Ruff format check
        run: ruff format --check cortex/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,api]"
      - name: Pyright type check
        run: pyright cortex/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,api]"
      - name: Install security tools
        run: pip install pip-audit bandit ruff
      - name: Audit dependencies for known CVEs
        run: pip-audit . --desc on --ignore-vuln GHSA-qmgc-5h2g-mvrw --ignore-vuln GHSA-j842-xgm4-wf88 --ignore-vuln GHSA-w6vg-jg77-2qg6 --ignore-vuln GHSA-f83h-ghpp-7wcc --ignore-vuln GHSA-jr27-m4p2-rc6r
      - name: Ruff SAST scan (S-select)
        run: ruff check cortex/ --select S --output-format json -o bandit-report.json
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: bandit-report
          path: bandit-report.json
      - name: SBOM generation
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0
        with:
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: sbom
          path: sbom.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      CORTEX_TEST_MODE: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"
      PYTHONWARNINGS: "error::DeprecationWarning,error::pytest.PytestUnhandledThreadExceptionWarning"
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev,api]"
      - name: Show test environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python --version
          python -m pytest --version
          pip freeze | sort | grep -E '^(coverage|pytest|pytest-asyncio|pytest-cov|pytest-timeout)=' || true
          python -m pytest --trace-config -q > test-artifacts/pytest-trace-config.txt 2>&1 || true
      - name: Collect tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python -m pytest tests/ --collect-only -q 2>&1 | tee test-artifacts/collect.log
      - name: Run tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          status=0
          timeout --signal=TERM 20m \
          python -X faulthandler -m pytest tests/ -vv -s --tb=short -x \
            --durations=20 \
            --timeout=300 \
            --timeout-method=thread \
            --junitxml=test-artifacts/pytest.xml \
            -o faulthandler_timeout=300 \
            --cov=cortex \
            --cov-report=xml \
            --cov-report=term-missing \
            -W error::DeprecationWarning \
            -W error::pytest.PytestUnhandledThreadExceptionWarning \
            2>&1 | tee test-artifacts/pytest.log || status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            echo "pytest exit code: ${status}"
            ps -ef || true
            pstree -ap || true
            exit "${status}"
          fi
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: test-diagnostics-py${{ matrix.python-version }}
          if-no-files-found: warn
          path: |
            test-artifacts/
            coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  compat-310:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CORTEX_TEST_MODE: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e ".[dev,api]"
      - name: Collect tests on minimum supported Python
        run: python -m pytest tests/ --collect-only -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, compat-310]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4
      - name: Build Docker image
        run: docker build -t cortex:test .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9a1457 # v0.28.0
        with:
          image-ref: cortex:test
          exit-code: 1
          severity: CRITICAL,HIGH
          format: table
      - name: Smoke test
        run: |
          docker run --rm -d --name cortex-test -p 8484:8484 cortex:test
          sleep 5
          curl -f http://localhost:8484/health || exit 1
          docker stop cortex-test
