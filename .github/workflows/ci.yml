name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  change-scope:
    uses: ./.github/workflows/reusable-change-scope.yml

  lint:
    needs: [change-scope]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|.github/mlc_config.json|README.md|README.es.md|README.zh.md|CONTRIBUTING.md|RELEASE_PROCESS.md|CHANGELOG.md|VERSION_SUPPORT.md|docs/*|ouroboros-matrix/README.md|Dockerfile|pyproject.toml|uv.lock|MANIFEST.in|cortex/__init__.py|cortex/cli/prompt_cmds.py|scripts/release_preflight.py|scripts/repo_health_changed.py|astro.config.mjs|vercel.json|.vercelignore|package.json|package-lock.json|src/*|public/*)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          python_files="$(grep -E '^(cortex|tests|scripts)/.*\.py$' .changed_files || true)"
          {
            echo "release_only=${release_only}"
            echo "python_files<<EOF"
            printf '%s\n' "${python_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install ruff
          if [ "${{ needs.change-scope.outputs.release_only }}" != "true" ]; then
            pip install -e ".[dev,api]"
          fi
      - name: Ruff lint (release-only)
        if: needs.change-scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files changed in release-only scope."
            exit 0
          fi
          ruff check "${files[@]}"
      - name: Ruff lint
        if: needs.change-scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files changed."
            exit 0
          fi
          ruff check "${files[@]}"
      - name: Ruff format check (release-only)
        if: needs.change-scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files changed in release-only scope."
            exit 0
          fi
          ruff format --check "${files[@]}"
      - name: Ruff format check
        if: needs.change-scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files changed."
            exit 0
          fi
          ruff format --check "${files[@]}"

  security:
    needs: [change-scope]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|.github/mlc_config.json|README.md|README.es.md|README.zh.md|CONTRIBUTING.md|RELEASE_PROCESS.md|CHANGELOG.md|VERSION_SUPPORT.md|docs/*|ouroboros-matrix/README.md|Dockerfile|pyproject.toml|uv.lock|MANIFEST.in|cortex/__init__.py|cortex/cli/prompt_cmds.py|scripts/release_preflight.py|scripts/repo_health_changed.py|astro.config.mjs|vercel.json|.vercelignore|package.json|package-lock.json|src/*|public/*)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          python_files="$(grep -E '^(cortex|tests|scripts)/.*\.py$' .changed_files || true)"
          {
            echo "release_only=${release_only}"
            echo "python_files<<EOF"
            printf '%s\n' "${python_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        if: needs.change-scope.outputs.release_only != 'true'
        run: pip install -e ".[dev,api]"
      - name: Install security tools
        run: |
          if [ "${{ needs.change-scope.outputs.release_only }}" = "true" ]; then
            pip install ruff
          else
            pip install pip-audit bandit ruff
          fi
      - name: Audit dependencies for known CVEs
        if: needs.change-scope.outputs.release_only != 'true'
        run: pip-audit . --desc on --ignore-vuln GHSA-qmgc-5h2g-mvrw --ignore-vuln GHSA-j842-xgm4-wf88 --ignore-vuln GHSA-w6vg-jg77-2qg6 --ignore-vuln GHSA-f83h-ghpp-7wcc --ignore-vuln GHSA-jr27-m4p2-rc6r
      - name: Release-only security smoke
        if: needs.change-scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -gt 0 ]; then
            ruff check "${files[@]}" --select S --output-format json -o bandit-report.json
          else
            printf '[]\n' > bandit-report.json
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          payload = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "version": 1,
              "components": [],
          }
          Path("sbom.json").write_text(json.dumps(payload) + "\n", encoding="utf-8")
          PY
      - name: Ruff SAST scan (S-select)
        if: needs.change-scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(printf '%s\n' "${{ steps.scope.outputs.python_files }}" | sed '/^$/d')
          if [ "${#files[@]}" -eq 0 ]; then
            printf '[]\n' > bandit-report.json
            exit 0
          fi
          ruff check "${files[@]}" --select S --output-format json -o bandit-report.json
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-report
          path: bandit-report.json
      - name: SBOM generation
        if: needs.change-scope.outputs.release_only != 'true'
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0
        with:
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

  test:
    needs: [change-scope]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      CORTEX_TEST_MODE: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONFAULTHANDLER: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|.github/mlc_config.json|README.md|README.es.md|README.zh.md|CONTRIBUTING.md|RELEASE_PROCESS.md|CHANGELOG.md|VERSION_SUPPORT.md|docs/*|ouroboros-matrix/README.md|Dockerfile|pyproject.toml|uv.lock|MANIFEST.in|cortex/__init__.py|cortex/cli/prompt_cmds.py|scripts/release_preflight.py|scripts/repo_health_changed.py|astro.config.mjs|vercel.json|.vercelignore|package.json|package-lock.json|src/*|public/*)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          test_files="$(grep -E '^tests/.*\.py$' .changed_files || true)"
          {
            echo "release_only=${release_only}"
            echo "test_files<<EOF"
            printf '%s\n' "${test_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        if: needs.change-scope.outputs.release_only != 'true'
        run: |
          pip install -e ".[dev,api]"
      - name: Install release smoke dependencies
        if: needs.change-scope.outputs.release_only == 'true'
        run: pip install build twine
      - name: Release-only smoke
        if: needs.change-scope.outputs.release_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/repo_health_changed.py
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            python -m build
            python scripts/release_preflight.py
            python -m twine check dist/*
          fi
      - name: Show test environment
        if: needs.change-scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          python --version
          python -m pytest --version
          pip freeze | sort | grep -E '^(coverage|pytest|pytest-asyncio|pytest-cov|pytest-timeout)=' || true
          mapfile -t changed_tests < <(printf '%s\n' "${{ steps.scope.outputs.test_files }}" | sed '/^$/d')
          if [ "${#changed_tests[@]}" -eq 0 ]; then
            python -m pytest tests/ --collect-only --trace-config -q > test-artifacts/pytest-trace-config.txt 2>&1 || true
          else
            python -m pytest "${changed_tests[@]}" --collect-only --trace-config -q > test-artifacts/pytest-trace-config.txt 2>&1 || true
          fi
      - name: Collect tests
        if: needs.change-scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          mapfile -t changed_tests < <(printf '%s\n' "${{ steps.scope.outputs.test_files }}" | sed '/^$/d')
          if [ "${#changed_tests[@]}" -eq 0 ]; then
            python -m pytest tests/ --collect-only -q 2>&1 | tee test-artifacts/collect.log
          else
            python -m pytest "${changed_tests[@]}" --collect-only -q 2>&1 | tee test-artifacts/collect.log
          fi
      - name: Run tests with coverage
        if: needs.change-scope.outputs.release_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          mapfile -t changed_tests < <(printf '%s\n' "${{ steps.scope.outputs.test_files }}" | sed '/^$/d')
          if [ "${#changed_tests[@]}" -eq 0 ]; then
            pytest_targets=(tests/)
          else
            pytest_targets=("${changed_tests[@]}")
          fi
          status=0
          timeout --signal=TERM 30m \
          python -X faulthandler -m pytest "${pytest_targets[@]}" -vv -s --tb=short -x \
            --durations=20 \
            --timeout=300 \
            --timeout-method=thread \
            --junitxml=test-artifacts/pytest.xml \
            -o faulthandler_timeout=300 \
            --cov=cortex \
            --cov-report=xml \
            --cov-report=term-missing \
            2>&1 | tee test-artifacts/pytest.log || status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            echo "pytest exit code: ${status}"
            ps -ef || true
            pstree -ap || true
            exit "${status}"
          fi
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-diagnostics-py${{ matrix.python-version }}
          if-no-files-found: warn
          path: |
            test-artifacts/
            coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test_status:
    name: test
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Require test matrix success
        shell: bash
        run: |
          if [[ "${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped" ]]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi

  quality-gates:
    name: "10 Seals"
    needs: [change-scope, test_status]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install CORTEX + dev deps
        if: needs.change-scope.outputs.release_only != 'true'
        run: |
          pip install -e ".[dev,api]" mypy pyright bandit pytest pytest-asyncio pytest-cov --quiet
      - name: "🩺 Release-only smoke"
        if: needs.change-scope.outputs.release_only == 'true'
        run: python scripts/repo_health_changed.py
      - name: "🛡️ Execute 10 Seals"
        if: needs.change-scope.outputs.release_only != 'true'
        run: python -m cortex.guards.seals

  sigint-entrypoint-smoke:
    needs: [change-scope]
    if: needs.change-scope.outputs.sigint_related == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install SIGINT smoke dependency
        run: python -m pip install httpx --quiet
      - name: Verify SIGINT module entrypoint
        run: |
          python -m cortex.extensions.moltbook.sigint --help
          python -m cortex.extensions.moltbook.sigint \
            --mode blueprint \
            --text "en resumen, como modelo de lenguaje"

  build:
    needs: [change-scope, lint, security, test, test_status]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          pip install build twine
          python -m build
          python scripts/release_preflight.py
          python -m twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  docker:
    needs: [change-scope, test]
    if: needs.change-scope.outputs.automation_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | sort -u > .changed_files
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | sort -u > .changed_files
          else
            git ls-files | sort -u > .changed_files
          fi

          release_only=true
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            case "${file}" in
              .github/workflows/*|.github/mlc_config.json|README.md|README.es.md|README.zh.md|CONTRIBUTING.md|RELEASE_PROCESS.md|CHANGELOG.md|VERSION_SUPPORT.md|docs/*|ouroboros-matrix/README.md|Dockerfile|pyproject.toml|uv.lock|MANIFEST.in|cortex/__init__.py|cortex/cli/prompt_cmds.py|scripts/release_preflight.py|scripts/repo_health_changed.py|astro.config.mjs|vercel.json|.vercelignore|package.json|package-lock.json|src/*|public/*)
                ;;
              *)
                release_only=false
                break
                ;;
            esac
          done < .changed_files

          echo "release_only=${release_only}" >> "${GITHUB_OUTPUT}"
      - name: Release-only container skip
        if: needs.change-scope.outputs.release_only == 'true'
        run: echo "Skipping container build for release-only scope."
      - name: Build Docker image
        if: needs.change-scope.outputs.release_only != 'true'
        run: docker build -t cortex:test .
      - name: Scan image with Trivy
        if: needs.change-scope.outputs.release_only != 'true'
                
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: cortex:test
          
          severity: CRITICAL,HIGH
          format: table
                  
      - name: Smoke test
        if: needs.change-scope.outputs.release_only != 'true'
        run: |
          docker run --rm -d --name cortex-test -p 8484:8484 cortex:test
          sleep 5
          curl -f http://localhost:8484/health || exit 1
          docker stop cortex-test
