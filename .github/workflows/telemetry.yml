name: C5-REAL Live Telemetry

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-telemetry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          pip install psutil
          
      - name: Generate Telemetry SVG
        run: |
          mkdir -p assets/marketing
          python scripts/generate_telemetry.py
          
      - name: Commit and Push if changed
        run: |
          git config --global user.name "CORTEX-Daemon[bot]"
          git config --global user.email "cortex-daemon@users.noreply.github.com"
          git add assets/marketing/telemetry.svg
          git commit -m "chore(telemetry): update C5-REAL execution metrics [skip ci]" || exit 0
          git push
