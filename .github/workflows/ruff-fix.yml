name: Fix Ruff lint errors

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to fix (leave empty to use default branch)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff fix
        run: |
          ruff check cortex/ tests/ scripts/ --fix --unsafe-fixes || true
          ruff format cortex/ tests/ scripts/ || true

      - name: Commit fixes directly to branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix(lint): apply ruff auto-fixes"
          git push origin HEAD
