name: ∞ MÖBIUS (Clojure)
description: >
  Where code IS data IS code. Sovereign Clojure agent for CI/CD
  self-healing, PR analysis, issue triage, and workflow auto-evolution.
inputs:
  action:
    description: 'Action to execute: pr-analyze, issue-triage, reflexion, workflow-audit, self-evolve'
    required: true
    default: 'reflexion'
  pr-number:
    description: 'Pull request number (for pr-analyze)'
    required: false
  issue-number:
    description: 'Issue number (for issue-triage)'
    required: false
outputs:
  result:
    description: 'JSON result of the agent action'
runs:
  using: 'composite'
  steps:
    - name: Install Babashka
      shell: bash
      run: |
        if ! command -v bb &> /dev/null; then
          echo "Installing Babashka..."
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install --dir /usr/local/bin
          rm install
        fi
        bb --version

    - name: Run MÖBIUS
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CORTEX_ACTION: ${{ inputs.action }}
        PR_NUMBER: ${{ inputs.pr-number }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
      run: |
        bb -m agent.core
