<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEX Firewall</title>
    <style>
        body {
            width: 250px;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: monospace;
            padding: 15px;
            margin: 0;
            border: 1px solid #333;
        }
        h1 {
            font-size: 14px;
            color: #2b3be5;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-top: 0;
        }
        .stat {
            margin: 15px 0;
            font-size: 12px;
        }
        .number {
            font-size: 24px;
            color: #ff3333;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }
        .status {
            color: #00ff00;
            font-size: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>CORTEX Firewall</h1>
    
    <div class="stat">
        Nodos Interceptados (Sesión):
        <span class="number" id="blockCount">0</span>
    </div>
    
    <div class="status">
        [ ESTADO: C5-REAL ACTIVO ]<br>
        Bloqueando Ruido Térmico
    </div>

    <script src="popup.js"></script>
</body>
</html>
