<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRIA 3 | SOVEREIGN ARCHITECT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="industrial-noir">
    <div class="grain"></div>
    
    <header>
        <div class="logo">LYRIA <span class="accent">0.3.0</span></div>
        <div class="status-indicator">
            <span class="dot" id="connection-dot"></span>
            <span id="status-text">DISCONNECTED</span>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1 class="glitch-text" data-text="GENERATIVE SONICS">GENERATIVE SONICS</h1>
            <p class="subtitle">Sovereign interface for Lyria-Realtime Protocol</p>
        </section>

        <div class="workspace">
            <div class="canvas-container">
                <canvas id="visualizer"></canvas>
                <div class="noise-overlay"></div>
            </div>

            <div class="controls-panel glass">
                <div class="input-group">
                    <label for="prompt">PRIMARY AXIOM</label>
                    <textarea id="prompt" placeholder="Search the void..."></textarea>
                </div>

                <div class="input-group">
                    <label for="prompt-secondary">SECONDARY AXIOM</label>
                    <textarea id="prompt-secondary" placeholder="Contrast the silence..."></textarea>
                </div>

                <div class="input-group morph-group">
                    <div class="label-row">
                        <label>MORPH</label>
                        <span id="morph-val">0%</span>
                    </div>
                    <input type="range" id="morph-slider" min="0" max="100" value="0">
                </div>

                <div class="effects-row">
                    <div class="input-group">
                        <div class="label-row">
                            <label>DISTORTION</label>
                        </div>
                        <input type="range" id="dist-slider" min="0" max="100" value="0">
                    </div>
                    <div class="input-group">
                        <div class="label-row">
                            <label>REVERB</label>
                        </div>
                        <input type="range" id="rev-slider" min="0" max="100" value="0">
                    </div>
                </div>
                
                <div class="actions">
                    <button id="summon-btn" class="cyber-btn">
                        <span class="btn-content">SUMMON AUDIO</span>
                    </button>
                    <button id="crystallize-btn" class="secondary-btn" disabled>CRYSTALLIZE</button>
                    <button id="stop-btn" class="secondary-btn" disabled>STOP</button>
                </div>
            </div>
        </div>

        <section class="telemetry">
            <div class="t-item">
                <span class="label">MODEL</span>
                <span class="value">LYRIA-REALTIME-EXP</span>
            </div>
            <div class="t-item">
                <span class="label">LATENCY</span>
                <span class="value" id="latency-val">-- MS</span>
            </div>
            <div class="t-item">
                <span class="label">ENTROPY</span>
                <span class="value">Ω₁.₂</span>
            </div>
        </section>

        <section class="sovereign-bottom">
            <div class="terminal-panel glass">
                <div class="panel-header">SYSTEM LOG</div>
                <div id="terminal-output" class="terminal-content">
                    > INITIALIZING LYRIA PROTOCOL...
                    > SOVEREIGN ARCHITECT STANDING BY.
                </div>
            </div>

            <div class="archive-panel glass">
                <div class="panel-header">SONIC ARCHIVE</div>
                <div id="axiom-list" class="axiom-list">
                    <div class="empty-state">NO ARCHIVED AXIOMS FOUND</div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/audio.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
