# Codecov configuration for Cortex-Persist
# Docs: https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error

ignore:
  - "tests/**"
  - "scripts/**"
  - "docs/**"
  - "benchmarks/**"
  - "examples/**"
  - "experimental/**"
  - "**/__pycache__/**"
  - "setup.py"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

flags:
  unittests:
    paths:
      - cortex/
    carryforward: true
