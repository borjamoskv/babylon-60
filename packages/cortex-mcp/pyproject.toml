[project]
name = "cortex-mcp"
version = "0.3.0b8"
description = "Persistent Memory for MCP Agents. Local, private, searchable, and available across sessions."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
    {name = "borjamoskv.com", email = "borja@moskv.com"},
]
keywords = [
    "ai", "memory", "agents", "mcp", "cortex"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "cortex-persist[mcp]>=0.3.0b8"
]

[project.urls]
Homepage = "https://cortexpersist.com"
Repository = "https://github.com/borjamoskv/Cortex-Persist"

[project.scripts]
cortex-mcp = "cortex.mcp.server:run_server"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
