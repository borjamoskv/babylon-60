<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEX 文档</title>
    <meta name="description" content="CORTEX 面向部署、API 和安全姿态的运维文档中心。">
    <link rel="stylesheet" href="../../saas.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #F0F0F0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 72px 24px;
        }

        .langbar {
            margin: 0 0 16px;
            color: #AFAFB2;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            font-size: 0.9rem;
        }

        .langbar a {
            color: #AFAFB2;
            text-decoration: none;
        }

        .langbar a.active {
            color: #CCFF00;
            font-weight: 700;
        }

        h1 { margin: 0; font-size: 2rem; }
        .hero p { color: #AFAFB2; }

        .cta {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            padding: 10px 14px;
            color: #F0F0F0;
            font-weight: 600;
        }

        .btn.primary {
            border-color: #CCFF00;
            color: #CCFF00;
        }

        .grid {
            margin-top: 28px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 16px;
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 1.05rem;
            color: #CCFF00;
        }

        .card p {
            color: #AFAFB2;
            margin: 0;
        }

        .card a {
            color: #CCFF00;
        }
    </style>
    <link rel="stylesheet" href="../kinetics.css">
    <script defer src="../kinetics.js"></script>
</head>
<body>
    <main class="wrap">
        <p class="langbar"><a href="../">EN</a> · <a href="../es/">ES</a> · <a class="active" href="./">ZH</a></p>
        <section class="hero">
            <h1>CORTEX 文档</h1>
            <p>用于部署、API 集成和安全保障的运维参考。</p>
            <div class="cta">
                <a class="btn primary" href="./quickstart/">快速上手</a>
                <a class="btn" href="./api/">API 指南</a>
                <a class="btn" href="./security/">安全</a>
                <a class="btn" href="./changelog/">更新日志</a>
                <a class="btn" href="../../saas_landing.html#pricing">价格</a>
            </div>
        </section>

        <section class="grid">
            <article class="card">
                <h2>可信持久化</h2>
                <p>为每次 AI 决策保持可加密验证的记忆链。</p>
            </article>
            <article class="card">
                <h2>租户隔离</h2>
                <p>按租户范围控制读写权限，包含审计连续性和可回滚写入。</p>
            </article>
            <article class="card">
                <h2>部署</h2>
                <p>本地安装、自托管，并通过受支持路由连接模型层。</p>
            </article>
            <article class="card">
                <h2>合规</h2>
                <p>面向受监管环境，提供不可变账本证据与追溯能力。</p>
            </article>
        </section>
    </main>
</body>
</html>
