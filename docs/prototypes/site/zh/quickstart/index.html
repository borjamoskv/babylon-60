        <h1>快速上手</h1>
        <p>快速安装并完成 CORTEX 的首轮校验。</p>

        <h2>1）安装</h2>
        <pre><code>pip install cortex-persist</code></pre>

        <h2>2）初始化</h2>
        <pre><code>cortex init
cortex trust-ledger verify</code></pre>

        <h2>3）写入一条事实</h2>
        <pre><code>cortex store --type decision "CORTEX release v1.3 审计证据模型已通过"</code></pre>

        <h2>4）查询与校验</h2>
        <pre><code>cortex query --q "v1.3 审批了什么？"
cortex trust-ledger verify --full</code></pre>
