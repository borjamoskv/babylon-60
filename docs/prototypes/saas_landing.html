<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEX — Trust Infrastructure for Autonomous AI</title>
    <meta name="description" content="Cryptographic verification, audit trails, and EU AI Act compliance for AI agents. <5ms latency. Zero cloud dependency.">
    <style>
        :root {
            --bg: #0A0A0A;
            --primary: #2B3BE5;
            --text: #F0F0F0;
            --text-dim: #A0A0A0;
            --accent: #E53B2B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Nav */
        nav {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text); }

        /* Hero */
        .hero {
            padding: 8rem 0;
            text-align: center;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #3b4bf5; }

        .btn-outline { border: 1px solid #333; color: var(--text); }
        .btn-outline:hover { border-color: #666; }

        /* Background Canvas */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    
    <nav class="container">
        <div class="logo">CORTEX</div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#compliance">Compliance</a>
            <a href="#pricing">Pricing</a>
            <a href="https://github.com/borjamoskv/Cortex-Persist">GitHub</a>
        </div>
    </nav>

    <header class="hero container">
        <h1>Trust Infrastructure for Swarms</h1>
        <p>Immutable ledgers, cryptographic verification, and EU AI Act compliance for autonomous agent systems. Run locally, scale globally.</p>
        <div class="cta-group">
            <a href="#" class="btn btn-primary">Start Building</a>
            <a href="#" class="btn btn-outline">Documentation</a>
        </div>
    </header>

    <!-- Load Three.js with SRI hash for security compliance (CodeQL #63) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" 
            integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" 
            crossorigin="anonymous"></script>
    
    <script>
        const canvas = document.getElementById('canvas-bg');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 2;

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 5;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.005,
            color: '#2B3BE5'
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
