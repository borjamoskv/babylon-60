SPECIFICATION Next
\* Use Next as the specification since we don't have a temporal formula for the whole system yet.

INIT Init
NEXT Next

\* Safety properties (Invariants)
INVARIANT TypeOK
INVARIANT WritePathIntegrity
INVARIANT NoReplay
\* Intentionally added to fail during verification, proving Key Compromise existential threat
INVARIANT NoCorruptEvents 

\* Liveness properties
PROPERTY EventuallyStable
PROPERTY EventualResolution

\* Constants to make the model finite and verifiable
CONSTANTS 
    Events = {[id |-> 1, nonce |-> 100], [id |-> 2, nonce |-> 101], [id |-> 3, nonce |-> 102]}
    ValidSigs = {[id |-> 1, nonce |-> 100], [id |-> 2, nonce |-> 101]}
    CorruptEvents = {[id |-> 2, nonce |-> 101]} \* A valid sig, but semantically corrupt (Adversary)
