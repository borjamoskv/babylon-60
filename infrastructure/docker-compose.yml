version: '3.8'

services:
  cortex-engine:
    image: python:3.12-slim
    container_name: cortex-engine
    environment:
      - CORTEX_ENV=production
      - REALITY_LEVEL=C5-REAL
      - CORTEX_TELEMETRY_PORT=8080
      - DB_DIR=/app/data
      - CORTEX_REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ../:/app/cortex-persist
    working_dir: /app/cortex-persist
    command: >
      bash -c "
      pip install cryptography &&
      python infrastructure/sdk_init.py &&
      python -m cortex.cli start
      "
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cortex_data:

  redis:
    image: redis:7-alpine
    container_name: cortex-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
