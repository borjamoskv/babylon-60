name = "cortex-edge-node"
main = "worker/src/index.ts"
compatibility_date = "2026-06-15"
compatibility_flags = ["nodejs_als"]

[placement]
mode = "smart"

[[d1_databases]]
binding = "CORTEX_LEDGER"
database_name = "cortex-ledger-prod"
database_id = "00000000-0000-0000-0000-000000000000"

[[vectorize]]
binding = "CORTEX_EMBEDDINGS"
index_name = "cortex-vectors"

[ai]
binding = "AI_ENGINE"

[[durable_objects.bindings]]
name = "SWARM_GOD_NODE"
class_name = "SwarmCoordinator"

[[migrations]]
tag = "v1"
new_classes = ["SwarmCoordinator"]
