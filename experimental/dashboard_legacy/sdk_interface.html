<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEX SDK — Music Fact Test</title>
    <style>
        body { background: #0A0A0A; color: #2B3BE5; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #2B3BE5; padding: 2rem; border-radius: 8px; background: rgba(43, 59, 229, 0.05); box-shadow: 0 0 20px rgba(43, 59, 229, 0.2); text-align: center; }
        button { background: #2B3BE5; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 1rem; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 1rem; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CORTEX LEDGER</h1>
        <p>Record Music Archeology Fact</p>
        <button id="recordBtn">RECORD FACT: Royksopp - The Axe</button>
        <div id="status">Ready to sync with API...</div>
    </div>

    <script type="module">
        // In a real app, you'd import from @cortex/persist-sdk
        // Here we verify_native the SDK logic to show the flow
        
        const config = {
            endpoint: 'http://localhost:8000',
            tenantId: 'borja-moskv-2026'
        };

        async function recordFact(data) {
            const status = document.getElementById('status');
            status.innerText = "Syncing with Sovereign Ledger...";
            
            try {
                const response = await fetch(`${config.endpoint}/api/facts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-ID': config.tenantId
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    status.innerText = `SUCCESS: Fact recorded in block ${result.id || 'N/A'}`;
                } else {
                    status.innerText = `ERROR: API offline or disk full?`;
                }
            } catch (e) {
                status.innerText = `CONNECTION FAILED: Is api.py running?`;
            }
        }

        document.getElementById('recordBtn').addEventListener('click', () => {
            recordFact({
                source: 'MUSIC_AUDIT_UI',
                content: 'Analyzed track: Royksopp - The Axe (FLAC - 82.8MB)',
                metadata: {
                    type: 'sonic_archeology',
                    action: 'inventory_sync'
                }
            });
        });
    </script>
</body>
</html>
