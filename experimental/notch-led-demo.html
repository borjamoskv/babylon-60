<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTCH LED</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;width:100vw;height:100vh;overflow:hidden;cursor:none;font-family:'SF Mono','JetBrains Mono',monospace}

  canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}

  /* Physical notch — flush top:0 */
  .notch{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:186px;height:32px;background:#000;
    border-radius:0 0 8px 8px;z-index:100;
    display:flex;align-items:center;justify-content:center;
  }
  .notch::after{
    content:'';width:6px;height:6px;border-radius:50%;
    background:#080808;box-shadow:inset 0 0 2px rgba(255,255,255,0.03);
  }

  /* ─── UI ──────────────────────────────────────────────── */
  .ui{
    position:fixed;bottom:0;left:0;right:0;padding:16px 0 20px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    z-index:200;opacity:0;transition:opacity 0.3s;
    background:linear-gradient(transparent,rgba(0,0,0,0.7));
  }
  body.show-ui .ui{opacity:1;cursor:default}
  .row{display:flex;gap:5px;align-items:center}
  .row .lbl{color:#2A2A2A;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-right:6px;min-width:44px;text-align:right}

  button{
    padding:4px 10px;border:1px solid #1A1A1A;background:#060606;
    color:#3A3A3A;font-family:inherit;font-size:8px;letter-spacing:1px;
    text-transform:uppercase;cursor:pointer;border-radius:3px;
    transition:all 0.1s;outline:none;
  }
  button:hover{border-color:#444;color:#777}
  button.on{border-color:#CCFF00;color:#CCFF00}

  .dot{
    width:16px;height:16px;border-radius:50%;border:2px solid #1A1A1A;
    cursor:pointer;transition:all 0.12s;
  }
  .dot:hover{transform:scale(1.2)}
  .dot.on{border-color:#fff;box-shadow:0 0 6px var(--dc)}
  .dot[data-c="cyber"]{background:#CCFF00;--dc:#CCFF00}
  .dot[data-c="violet"]{background:#6600FF;--dc:#6600FF}
  .dot[data-c="blood"]{background:#FF1744;--dc:#FF1744}
  .dot[data-c="yinmn"]{background:#2E5090;--dc:#2E5090}
  .dot[data-c="gold"]{background:#D4AF37;--dc:#D4AF37}
  .dot[data-c="white"]{background:#FFF;--dc:#FFF}
  .dot[data-c="rgb"]{background:conic-gradient(#F04,#CF0,#08F,#F04);--dc:#FFF}

  .hint{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#151515;font-size:9px;letter-spacing:3px;text-transform:uppercase;
    z-index:200;pointer-events:none;text-align:center;line-height:2.4;
    opacity:0;transition:opacity 0.3s;
  }
  body.show-ui .hint{opacity:1}
  body.is-fs .hint{opacity:0}

  /* Mic indicator */
  .mic-badge{
    position:fixed;top:42px;left:50%;transform:translateX(-50%);
    color:#FF1744;font-size:8px;letter-spacing:2px;text-transform:uppercase;
    z-index:200;opacity:0;transition:opacity 0.3s;
    display:flex;align-items:center;gap:4px;
  }
  .mic-badge.active{opacity:1}
  .mic-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#FF1744;animation:mic-dot 1s infinite}
  @keyframes mic-dot{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="notch"></div>
<div class="mic-badge" id="mic-badge">mic live</div>

<div class="hint">F fullscreen &nbsp;·&nbsp; M mic reactive</div>

<div class="ui">
  <div class="row">
    <span class="lbl">fx</span>
    <button onclick="fx('breathe')" class="on" data-fx="breathe">Breathe</button>
    <button onclick="fx('heartbeat')" data-fx="heartbeat">Heart</button>
    <button onclick="fx('wave')" data-fx="wave">Wave</button>
    <button onclick="fx('aurora')" data-fx="aurora">Aurora</button>
    <button onclick="fx('strobe')" data-fx="strobe">Strobe</button>
    <button onclick="fx('notify')" data-fx="notify">Notify</button>
    <button onclick="fx('rain')" data-fx="rain">Rain</button>
  </div>
  <div class="row">
    <span class="lbl">color</span>
    <div class="dot on" data-c="cyber" onclick="col('cyber')"></div>
    <div class="dot" data-c="violet" onclick="col('violet')"></div>
    <div class="dot" data-c="blood" onclick="col('blood')"></div>
    <div class="dot" data-c="yinmn" onclick="col('yinmn')"></div>
    <div class="dot" data-c="gold" onclick="col('gold')"></div>
    <div class="dot" data-c="white" onclick="col('white')"></div>
    <div class="dot" data-c="rgb" onclick="col('rgb')"></div>
  </div>
  <div class="row">
    <span class="lbl">speed</span>
    <button onclick="spd(0.4)" data-s="0.4">Slow</button>
    <button onclick="spd(1)" class="on" data-s="1">1×</button>
    <button onclick="spd(2)" data-s="2">2×</button>
    <button onclick="spd(4)" data-s="4">4×</button>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────
const COLORS={
  cyber:{r:204,g:255,b:0},violet:{r:102,g:0,b:255},
  blood:{r:255,g:23,b:68},yinmn:{r:46,g:80,b:144},
  gold:{r:212,g:175,b:55},white:{r:255,g:255,b:255}
};
let curColor='cyber',curFx='breathe',speed=1,rgbMode=false;
let micLevel=0,micActive=false,audioCtx,analyser,micData;

// ─── Canvas ───────────────────────────────────────────────
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;cx.scale(dpr,dpr);
}
resize();addEventListener('resize',resize);

// ─── LED Strip (individual point lights along notch edge) ─
const LED_COUNT=12;
const leds=[];
for(let i=0;i<LED_COUNT;i++){
  leds.push({
    offset:(i/(LED_COUNT-1)-0.5)*170, // spread across 170px
    phase:i*0.5,
    intensity:0
  });
}

// ─── Particles ────────────────────────────────────────────
const PCOUNT=80;
const particles=[];

class P{
  constructor(){this.reset()}
  reset(){
    this.x=W/2+(Math.random()-0.5)*160;
    this.y=Math.random()*8;
    this.vx=(Math.random()-0.5)*0.25;
    this.vy=0.08+Math.random()*0.35;
    this.life=0;
    this.maxLife=60+Math.random()*140;
    this.size=0.3+Math.random()*1.8;
    this.turb=Math.random()*0.015;
    this.turbPhase=Math.random()*Math.PI*2;
  }
  update(dt,t){
    this.life+=dt;
    if(this.life>this.maxLife){this.reset();return}
    // Turbulence: sine-based drift
    this.vx+=Math.sin(t*0.001+this.turbPhase)*this.turb;
    this.vx*=0.99; // damping
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
  }
  draw(cx,color,intensity){
    const alpha=Math.sin(this.life/this.maxLife*Math.PI)*0.4*intensity;
    if(alpha<=0.01)return;
    cx.beginPath();
    cx.arc(this.x,this.y,this.size,0,Math.PI*2);
    cx.fillStyle=`rgba(${color.r},${color.g},${color.b},${alpha})`;
    cx.fill();
  }
}

// Spark particles (occasional bright shoots)
const sparks=[];
class Spark{
  constructor(){this.alive=false}
  spawn(x,color){
    this.x=x;this.y=30;
    this.vx=(Math.random()-0.5)*1.5;
    this.vy=0.5+Math.random()*2;
    this.life=0;this.maxLife=20+Math.random()*30;
    this.size=0.5+Math.random();
    this.color=color;this.alive=true;
  }
  update(dt){
    if(!this.alive)return;
    this.life+=dt;
    if(this.life>this.maxLife){this.alive=false;return}
    this.vy+=0.03*dt; // gravity
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
  }
  draw(cx){
    if(!this.alive)return;
    const a=1-(this.life/this.maxLife);
    if(a<=0)return;
    cx.beginPath();
    cx.arc(this.x,this.y,this.size*a,0,Math.PI*2);
    cx.fillStyle=`rgba(${this.color.r},${this.color.g},${this.color.b},${a*0.8})`;
    cx.fill();
  }
}

for(let i=0;i<PCOUNT;i++){const p=new P();p.life=Math.random()*p.maxLife;particles.push(p)}
for(let i=0;i<20;i++)sparks.push(new Spark());

// ─── Noise (simplified perlin) ────────────────────────────
function noise(x,y){
  const i=Math.floor(x),j=Math.floor(y);
  const fx=x-i,fy=y-j;
  const a=Math.sin(i*127.1+j*311.7)*43758.5453;
  const b=Math.sin((i+1)*127.1+j*311.7)*43758.5453;
  const c=Math.sin(i*127.1+(j+1)*311.7)*43758.5453;
  const d=Math.sin((i+1)*127.1+(j+1)*311.7)*43758.5453;
  const fa=a-Math.floor(a),fb=b-Math.floor(b);
  const fc=c-Math.floor(c),fd=d-Math.floor(d);
  const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);
  return fa+(fb-fa)*sx+(fc-fa)*sy+(fa-fb-fc+fd)*sx*sy;
}

// ─── Color engine ─────────────────────────────────────────
function hsl2rgb(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return{r:Math.round(f(0)*255),g:Math.round(f(8)*255),b:Math.round(f(4)*255)};
}

function getColor(t){
  if(!rgbMode)return COLORS[curColor]||COLORS.cyber;
  return hsl2rgb(((t*0.0003*speed)%1)*360,100,50);
}

// ─── Intensity engine ─────────────────────────────────────
function getIntensity(t){
  const s=speed;
  const mic=micActive?micLevel:0;
  let base;

  switch(curFx){
    case'breathe':base=0.3+0.7*(0.5+0.5*Math.sin(t*0.002*s));break;
    case'heartbeat':{
      const p=((t*0.005*s)%1);
      if(p<0.12)base=0.2+0.8*(p/0.12);
      else if(p<0.24)base=1-0.7*((p-0.12)/0.12);
      else if(p<0.36)base=0.3+0.6*((p-0.24)/0.12);
      else if(p<0.48)base=0.9-0.7*((p-0.36)/0.12);
      else base=0.2;break;
    }
    case'wave':base=0.4+0.6*(0.5+0.5*Math.sin(t*0.003*s));break;
    case'aurora':base=0.5+0.5*noise(t*0.0008*s,0.5);break;
    case'strobe':base=((t*0.008*s)%1)<0.5?1:0;break;
    case'notify':{
      const c=((t*0.001*s)%4);
      if(c<0.15)base=c/0.15;
      else if(c<0.5)base=1-((c-0.15)/0.35)*0.8;
      else if(c<0.6)base=0.2+((c-0.5)/0.1)*0.5;
      else if(c<1)base=0.7-((c-0.6)/0.4)*0.6;
      else base=0.1;break;
    }
    case'rain':base=0.15+0.85*Math.pow(noise(t*0.002*s,1.7),0.5);break;
    default:base=0.5;
  }

  // Mic boost
  return Math.min(1,base+mic*0.5);
}

// ─── Render ───────────────────────────────────────────────
let lt=0,sparkTimer=0;

function render(t){
  const dt=Math.min((t-lt)/16.67,3);
  lt=t;

  const color=getColor(t);
  const intensity=getIntensity(t);
  const wOff=curFx==='wave'?Math.sin(t*0.002*speed)*50:
             curFx==='aurora'?(noise(t*0.0005*speed,0)-0.5)*80:0;

  cx.clearRect(0,0,W,H);
  cx.globalCompositeOperation='lighter'; // additive blending!

  const midX=W/2+wOff;

  // ─── Individual LED points along notch edge ─────────────
  for(const led of leds){
    const lx=midX+led.offset;
    const ly=32;

    // Per-LED intensity variation (simulates individual LED flicker)
    const ledFlicker=0.7+0.3*Math.sin(t*0.004*speed+led.phase);
    const li=intensity*ledFlicker;

    // Small tight glow per LED
    const g1=cx.createRadialGradient(lx,ly,0,lx,ly,18);
    g1.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${0.5*li})`);
    g1.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=g1;
    cx.fillRect(lx-20,ly-5,40,25);

    // Medium spread per LED
    const g2=cx.createRadialGradient(lx,ly,0,lx,ly+10,45);
    g2.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${0.12*li})`);
    g2.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=g2;
    cx.fillRect(lx-50,ly-10,100,60);
  }

  // ─── Global glow cone (merged light) ────────────────────
  const gg=cx.createRadialGradient(midX,0,20,midX,0,280);
  gg.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${0.15*intensity})`);
  gg.addColorStop(0.4,`rgba(${color.r},${color.g},${color.b},${0.04*intensity})`);
  gg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=gg;
  cx.fillRect(midX-300,0,600,300);

  // ─── Ultra-wide atmospheric bleed ───────────────────────
  const ga=cx.createRadialGradient(midX,0,50,midX,0,500);
  ga.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${0.03*intensity})`);
  ga.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=ga;
  cx.fillRect(midX-500,0,1000,500);

  // ─── Side edge bleed (light wrapping around notch) ──────
  const edgeInt=0.3*intensity;
  // Left edge
  const gl=cx.createRadialGradient(midX-93,16,0,midX-93,16,30);
  gl.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${edgeInt})`);
  gl.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=gl;cx.fillRect(midX-125,0,40,40);
  // Right edge
  const gr=cx.createRadialGradient(midX+93,16,0,midX+93,16,30);
  gr.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${edgeInt})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=gr;cx.fillRect(midX+85,0,40,40);

  // ─── Top edge strip (light escaping above bezel) ────────
  cx.fillStyle=`rgba(${color.r},${color.g},${color.b},${0.1*intensity})`;
  cx.fillRect(midX-93-50,0,50+186+50,2);

  // ─── Particles ──────────────────────────────────────────
  cx.globalCompositeOperation='lighter';
  for(const p of particles){
    p.x+=(wOff*0.002)*dt;
    p.update(dt,t);
    p.draw(cx,color,intensity);
  }

  // ─── Sparks (occasional) ────────────────────────────────
  sparkTimer+=dt;
  if(sparkTimer>3+Math.random()*8||intensity>0.9&&sparkTimer>1){
    sparkTimer=0;
    const deadSpark=sparks.find(s=>!s.alive);
    if(deadSpark)deadSpark.spawn(midX+(Math.random()-0.5)*150,color);
  }
  for(const s of sparks){s.update(dt);s.draw(cx)}

  // ─── Aurora tendrils (only in aurora mode) ──────────────
  if(curFx==='aurora'){
    cx.globalCompositeOperation='lighter';
    for(let i=0;i<5;i++){
      const ax=midX+(noise(t*0.0003*speed+i*10,i)-0.5)*300;
      const ay=30+noise(t*0.0004*speed+i*5,i*2)*60;
      const aSize=20+noise(t*0.0006*speed+i,i*3)*40;
      const aAlpha=0.06*intensity*(0.5+0.5*noise(t*0.001*speed+i*7,0));
      const ag=cx.createRadialGradient(ax,ay,0,ax,ay,aSize);
      ag.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${aAlpha})`);
      ag.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=ag;
      cx.fillRect(ax-aSize,ay-aSize,aSize*2,aSize*2);
    }
  }

  // ─── Rain drops (only in rain mode) ─────────────────────
  if(curFx==='rain'){
    cx.globalCompositeOperation='lighter';
    for(let i=0;i<8;i++){
      const rx=midX+(noise(t*0.002*speed+i*13,i+5)-0.5)*200;
      const ry=noise(t*0.003*speed+i*7,i*3)*120;
      const rAlpha=0.15*intensity*Math.pow(noise(t*0.004*speed+i*11,i*2),2);
      const rg=cx.createRadialGradient(rx,ry,0,rx,ry,15);
      rg.addColorStop(0,`rgba(${color.r},${color.g},${color.b},${rAlpha})`);
      rg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=rg;
      cx.fillRect(rx-15,ry-15,30,30);
    }
  }

  cx.globalCompositeOperation='source-over';
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ─── Audio (Mic) ──────────────────────────────────────────
async function toggleMic(){
  if(micActive){
    micActive=false;
    document.getElementById('mic-badge').classList.remove('active');
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new AudioContext();
    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    src.connect(analyser);
    micData=new Uint8Array(analyser.frequencyBinCount);
    micActive=true;
    document.getElementById('mic-badge').classList.add('active');

    function readMic(){
      if(!micActive)return;
      analyser.getByteFrequencyData(micData);
      // RMS of first 64 bins
      let sum=0;
      for(let i=0;i<64;i++)sum+=micData[i]*micData[i];
      micLevel=Math.sqrt(sum/64)/255;
      requestAnimationFrame(readMic);
    }
    readMic();
  }catch(e){
    console.warn('Mic access denied',e);
  }
}

// ─── Controls ─────────────────────────────────────────────
function col(c){
  rgbMode=(c==='rgb');
  if(!rgbMode)curColor=c;
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('on'));
  document.querySelector(`.dot[data-c="${c}"]`).classList.add('on');
}
function fx(f){
  curFx=f;
  document.querySelectorAll('[data-fx]').forEach(b=>b.classList.remove('on'));
  document.querySelector(`[data-fx="${f}"]`).classList.add('on');
}
function spd(s){
  speed=s;
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.remove('on'));
  document.querySelector(`[data-s="${s}"]`).classList.add('on');
}

// Keyboard
addEventListener('keydown',e=>{
  if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen();
      document.body.classList.add('is-fs');
    }else{
      document.exitFullscreen();
      document.body.classList.remove('is-fs');
    }
  }
  if(e.key==='m'||e.key==='M')toggleMic();
  const km={'1':'cyber','2':'violet','3':'blood','4':'yinmn','5':'gold','6':'white','7':'rgb'};
  const kf={'b':'breathe','h':'heartbeat','w':'wave','a':'aurora','s':'strobe','n':'notify','r':'rain'};
  if(km[e.key])col(km[e.key]);
  if(kf[e.key])fx(kf[e.key]);
});

// UI auto-hide
let ht;
addEventListener('mousemove',()=>{
  document.body.style.cursor='default';
  document.body.classList.add('show-ui');
  clearTimeout(ht);
  ht=setTimeout(()=>{document.body.style.cursor='none';document.body.classList.remove('show-ui')},2500);
});

addEventListener('fullscreenchange',()=>{
  document.body.classList.toggle('is-fs',!!document.fullscreenElement);
});
</script>
</body>
</html>
