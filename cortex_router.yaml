model_list:
  # ==========================================
  # CORTEX-PERSIST FALLBACK MATRIX (C5-REAL)
  # ==========================================
  
  - model_name: gpt-4o # Reemplazo del target por defecto de Antigravity
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
      # Si OpenRouter colapsa por cuota o rate limit, el sistema cae en cascada:
      fallbacks: ["venice-model", "local-ollama"]

  - model_name: venice-model
    litellm_params:
      model: openai/venice-model
      api_base: https://api.venice.ai/api/v1
      api_key: os.environ/VENICE_API_KEY
      
  - model_name: local-ollama
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: http://localhost:11434

  - model_name: autodidact
    litellm_params:
      model: openai/qwen3.6-27b
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY
      extra_body:
        enable_thinking: true
        preserve_thinking: true
      fallbacks: ["gpt-4o", "venice-model", "local-ollama"]

