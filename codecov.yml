# Codecov configuration for Cortex-Persist
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: auto          # maintain or improve coverage
        threshold: 1%         # allow up to 1% drop
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        target: 80%           # new code must have at least 80% coverage
        threshold: 5%
        if_not_found: success
        if_ci_failed: error

ignore:
  - "tests/**"
  - "scripts/**"
  - "**/conftest.py"
  - "**/__pycache__/**"

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false

flags:
  unittests:
    paths:
      - cortex/
    carryforward: false
