version: 2

models:
  - name: stg_exergy_extraction
    description: "CORTEX-Guard compliant model. Extracts interaction exergy from LP_Web."
    columns:
      - name: session_id
        description: "Unique identifier for the LP session."
        tests:
          - unique
          - not_null
      - name: interaction_time
        description: "C5-REAL timestamp of the interaction."
      - name: safe_friction_score
        description: "Cognitive friction score normalized between 0 and 100."
      - name: normalized_device
        description: "Device type accessing the LP, cleaned."
  - name: int_exergy_ledger
    description: "Core integration layer. Calculates total Exergy yield and isolates high-signal interactions."
    columns:
      - name: session_id
        description: "Unique identifier for the high-signal LP session."
        tests:
          - unique
          - not_null
      - name: normalized_device
        description: "Device type accessing the LP."
      - name: session_exergy_yield
        description: "Average cognitive friction score representing Exergy yield."
