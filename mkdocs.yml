site_name: CORTEX Documentation
site_description: Trust Infrastructure for Autonomous AI — cryptographic verification, audit trails, and EU AI Act compliance for AI agent memory.
site_url: https://cortexpersist.dev
repo_url: https://github.com/borjamoskv/Cortex-Persist
repo_name: borjamoskv/Cortex-Persist
edit_uri: edit/master/docs/
copyright: "© 2026 MOSKV-1 Sovereign Systems · Apache 2.0"

theme:
  name: material
  logo: https://raw.githubusercontent.com/borjamoskv/cortex/master/assets/shield.svg
  favicon: https://raw.githubusercontent.com/borjamoskv/cortex/master/assets/shield.svg
  palette:
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Installation: installation.md
      - Configuration: configuration.md
  - Reference:
      - Architecture: architecture.md
      - Operating Axioms: operating-axioms.md
      - Knowledge Architecture: knowledge-architecture.md
      - Peano Soberano (7 Axioms): peano-soberano.md
      - API Classes: reference.md
      - CLI Reference: cli.md
      - REST API: api.md
      - MCP Server: mcp.md
      - SDKs: sdks.md
  - Guides:
      - Developer Guide: developer-guide.md
      - Deployment: deployment.md
      - Cross-Platform: cross_platform_guide.md
  - Compliance & Security:
      - EU AI Act Compliance: compliance.md
      - Security: security.md
      - Sovereign Infrastructure: sovereign-infrastructure.md
  - Tutorials:
      - Memory for LangChain Agents: tutorials/langchain.md
      - Multi-Agent Consensus: tutorials/consensus.md
      - Time-Travel Debugging: tutorials/temporal.md
      - Site Monitoring Daemon: tutorials/daemon.md
  - Project:
      - FAQ: faq.md
      - Changelog: changelog.md

