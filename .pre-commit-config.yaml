# CORTEX Pre-commit hooks
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: doc-entropy-linter
        name: Document Entropy Linter (No Engine versions)
        entry: "(?i)Engine:\\s*v[0-9]+"
        language: pygrep
        files: \.md$
        exclude: ^CHANGELOG\.md$
      - id: cortex-fast-tests
        name: CORTEX Fast Tests
        entry: .venv/bin/pytest
        args: [tests/, -m, "not slow", -n, auto, --tb=line, -q, --no-header]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
      - id: moskv-aegis-audit
        name: Moskv-Aegis Adversarial Audit
        entry: .venv/bin/cortex
        args: [moskv-aegis, audit]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
