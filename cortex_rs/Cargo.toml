[package]
name = "cortex_rs"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]
name = "cortex_rs"

[dependencies]
memmap2 = "0.9.10"
num_cpus = "1.17.0"
pyo3 = { version = "0.28.3", features = ["extension-module", "abi3-py310"] }
rayon = "1.12.0"
sha2 = "0.10.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8.5"
rdkafka = { version = "0.36.2", features = ["cmake-build"] }
rand_distr = "0.4.3"
hex = "0.4"
wasm-runtime = { path = "../crates/wasm-runtime" }

[profile.release]
opt-level = 3
lto = "thin"
panic = "abort"
strip = true
