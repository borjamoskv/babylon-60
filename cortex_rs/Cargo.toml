[package]
name = "cortex_rs"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]
name = "cortex_rs"

[dependencies]
memmap2 = "0.9.10"
num_cpus = "1.17.0"
pyo3 = { version = "0.28.3", features = ["extension-module"] }
rayon = "1.12.0"
sha2 = "0.10.8"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
