services:
  open-cortex:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    environment:
      - OCORTEX_DATABASE_URL=sqlite:///data/open_cortex.db
      - OCORTEX_METRICS_ENABLED=true
    volumes:
      - cortex-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cortex-data:
